worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 업스트림 — FastAPI
    upstream backend {
        server backend:8000;
    }

    upstream admin {
        server admin:8501;
    }

    # HTTP → HTTPS 리다이렉트
    server {
        listen 80;
        server_name api.momstalk.kr;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS 메인 서버
    server {
        listen 443 ssl http2;
        server_name api.momstalk.kr;

        ssl_certificate     /etc/letsencrypt/live/api.momstalk.kr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.momstalk.kr/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # SSE 연결을 위한 버퍼링 비활성화
        proxy_buffering off;
        proxy_cache off;

        # 공통 프록시 헤더
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 전용 — /api/v1/conversations/stream (DM 실시간 수신)
        location ~ ^/api/v1/(conversations/stream|stream)$ {
            proxy_pass         http://backend;
            proxy_read_timeout 3600s;   # SSE 연결 유지
            proxy_send_timeout 3600s;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            chunked_transfer_encoding on;
            # Nginx 자체 버퍼 완전 비활성화
            proxy_set_header   X-Accel-Buffering no;
        }

        # 일반 API
        location /api/ {
            proxy_pass         http://backend;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # 헬스체크
        location /health {
            proxy_pass http://backend;
        }

        # 관리자 대시보드 — IP 화이트리스트 필수
        location /admin/ {
            # ★ 아래 allow 라인에 실제 관리자 IP를 추가하세요
            # allow 1.2.3.4;
            # deny  all;

            proxy_pass         http://admin/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";  # Streamlit WebSocket
            proxy_set_header   Host $host;
            proxy_read_timeout 86400;
        }

        # Streamlit static/_stcore 경로 (WebSocket 필요)
        location /admin/_stcore/ {
            # allow 1.2.3.4;
            # deny  all;
            proxy_pass         http://admin/_stcore/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}

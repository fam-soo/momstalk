name: momstalk
description: 학부모 전용 익명 커뮤니티 앱
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 상태 관리
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 네트워크
  dio: ^5.4.3+1
  retrofit: ^4.1.0
  http: ^1.2.0

  # 로컬 저장소 (웹: SharedPreferences/localStorage, 모바일: FlutterSecureStorage/Keychain)
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # 라우팅
  go_router: ^14.0.2

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  timeago: ^3.6.1
  intl: ^0.19.0
  pull_to_refresh: ^2.0.0

  # 카카오 로그인 (1.10.0 widget_previews 버그로 1.9.0 고정)
  kakao_flutter_sdk_user: ^1.9.0

  # 이미지 선택
  image_picker: ^1.1.2

  # 딥링크
  app_links: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

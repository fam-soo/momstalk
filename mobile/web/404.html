<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MomsTalk</title>
  <script>
    // GitHub Pages SPA 라우팅 — /path를 /#/path로 리다이렉트 (Flutter 해시 라우팅)
    var l = window.location;
    l.replace(l.protocol + '//' + l.host + '/#' + l.pathname + l.search + l.hash);
  </script>
</head>
<body></body>
</html>

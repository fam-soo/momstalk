<!DOCTYPE html>
<html>
<head>
  <meta name="naver-site-verification" content="7eea04f277cba8870ac3351c9aa34a1344a07a4c" />
  <meta name="google-site-verification" content="BrckOzBI6A_KRCWGWQwiiFY3mK8POUu0m4Bv_x2BcFc" />
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="학부모 전용 익명 커뮤니티 — MomsTalk">

  <!-- 배포 시 CI(.github/workflows/deploy-web.yml)가 실제 커밋 SHA로 덮어씀.
       core/update_checker.dart가 이 값과 서버의 build-id.txt를 비교해
       새 배포를 감지하면 새로고침 안내 배너를 띄운다. -->
  <meta name="build-id" content="dev">

  <!-- PWA / 홈화면 추가 -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MomsTalk">
  <meta name="theme-color" content="#4A90D9">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- 한글 폰트 사전 로드: Flutter 렌더링 전에 로드해 두부문자(□×) 방지 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=block" rel="stylesheet">

  <title>MomsTalk</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // 백그라운드 알림 클릭 시 firebase-messaging-sw.js가 이미 열려있는 탭을
    // 포커스하면서 postMessage로 이동할 경로를 알려준다. 여기서 그 경로를
    // 해시(#)에 반영하면 go_router(해시 라우팅)가 전체 새로고침 없이
    // 해당 화면으로 이동시킨다.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'notification-click' && event.data.path) {
          window.location.hash = event.data.path.replace(/^\/#/, '');
        }
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

version: "3.9"

services:
  # 통합 DB (유저, 인증, 게시글, 댓글, 학원 등 모든 테이블)
  db:
    image: postgres:16-alpine
    container_name: momstalk_db
    environment:
      POSTGRES_USER: momstalk
      POSTGRES_PASSWORD: momstalk_pass
      POSTGRES_DB: momstalk_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U momstalk -d momstalk_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (Rate Limit, 향후 토큰 블랙리스트)
  redis:
    image: redis:7-alpine
    container_name: momstalk_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI 백엔드
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: momstalk_backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Streamlit 관리자 대시보드
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: momstalk_admin
    env_file:
      - ./admin/.env
    ports:
      - "8501:8501"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

version: "3.9"

services:
  # 서비스 DB (게시글, 유저, 댓글 등 — 신원 정보 없음)
  db_service:
    image: postgres:16-alpine
    container_name: momstalk_service_db
    environment:
      POSTGRES_USER: momstalk
      POSTGRES_PASSWORD: momstalk_pass
      POSTGRES_DB: momstalk_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata_service:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U momstalk -d momstalk_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 인증 DB (전화번호, 학부모 인증 레코드 — 서비스 DB와 물리적 분리)
  db_auth:
    image: postgres:16-alpine
    container_name: momstalk_auth_db
    environment:
      POSTGRES_USER: momstalk_auth
      POSTGRES_PASSWORD: momstalk_auth_pass
      POSTGRES_DB: momstalk_auth_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata_auth:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U momstalk_auth -d momstalk_auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (세션 토큰, 캐시, Celery 브로커)
  redis:
    image: redis:7-alpine
    container_name: momstalk_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI 백엔드 (nginx 뒤에 위치, 외부 포트 직접 노출 안 함)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: momstalk_backend
    env_file:
      - ./backend/.env
    expose:
      - "8000"
    depends_on:
      db_service:
        condition: service_healthy
      db_auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Nginx — HTTPS + SSE 역방향 프록시
  nginx:
    image: nginx:1.25-alpine
    container_name: momstalk_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/letsencrypt:ro         # certbot 인증서
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
    restart: unless-stopped

  # Streamlit 관리자 대시보드 (외부 직접 노출 안 함 — nginx /admin/ 통해서만)
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: momstalk_admin
    env_file:
      - ./admin/.env
    expose:
      - "8501"
    depends_on:
      - db_service
    restart: unless-stopped

  # Certbot — Let's Encrypt 인증서 발급/갱신
  certbot:
    image: certbot/certbot:latest
    container_name: momstalk_certbot
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata_service:
  pgdata_auth:
  redisdata:
  certbot_www:

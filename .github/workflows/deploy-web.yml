name: Deploy Flutter Web → Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ runner.os }}-3.32.2

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: mobile
        run: flutter build web --release --base-href / --no-tree-shake-icons --dart-define=ENVIRONMENT=production

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          mkdir -p .vercel/output/static
          cp -r mobile/build/web/. .vercel/output/static/
          echo '{"version":3,"routes":[{"handle":"filesystem"},{"src":".*","dest":"/index.html"}]}' > .vercel/output/config.json
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

name: Deploy Flutter Web → Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ runner.os }}-3.32.2

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: mobile
        run: flutter build web --release --base-href / --no-tree-shake-icons --dart-define=ENVIRONMENT=production

      - name: Stamp build-id (강제 새로고침 안내용)
        run: |
          BUILD_ID="${{ github.sha }}"
          echo "$BUILD_ID" > mobile/build/web/build-id.txt
          sed -i "s|<meta name=\"build-id\" content=\"dev\">|<meta name=\"build-id\" content=\"${BUILD_ID}\">|" mobile/build/web/index.html
          grep -o '<meta name="build-id"[^>]*>' mobile/build/web/index.html

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          mkdir -p .vercel/output/static
          cp -r mobile/build/web/. .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              { "src": "/build-id.txt", "headers": { "Cache-Control": "no-store, must-revalidate" }, "continue": true },
              { "src": "/index.html", "headers": { "Cache-Control": "no-store, must-revalidate" }, "continue": true },
              { "handle": "filesystem" },
              { "src": ".*", "dest": "/index.html" }
            ]
          }
          EOF
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
